gesdinet_jwt_refresh_token:
    refresh_token_class: App\Entity\RefreshToken
    ttl: 2592000 # 30 days in seconds
    ttl_update: true
    return_expiration: true

    cookie:
        enabled: true
        secure: false # Set to true in production with HTTPS
        http_only: true
        same_site: lax
        path: /
        domain: null
        partitioned: false
        remove_token_from_body: true
